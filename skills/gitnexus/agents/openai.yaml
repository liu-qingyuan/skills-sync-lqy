interface:
  display_name: "GitNexus"
  short_description: "Guide local GitNexus code-graph tools"
  default_prompt: "Use $gitnexus to check local GitNexus status, index the repo first when unindexed, choose the right GitNexus-related skill, and ground graph claims with source or test evidence."
dependencies:
  tools:
    - type: "mcp"
      value: "gitnexus"
      description: "Optional local GitNexus MCP server for indexed repository graph context"
      transport: "stdio"
policy:
  allow_implicit_invocation: true
