interface:
  display_name: "GitNexus Codex Wiki"
  short_description: "Wiki/architecture docs from GitNexus evidence"
  default_prompt: "Use $gitnexus-codex-wiki with local GitNexus CLI/index evidence to produce graph-grounded wiki or architecture-web docs from this repo."
dependencies:
  tools:
    - type: "mcp"
      value: "gitnexus"
      description: "GitNexus MCP server for indexed repository graph context"
      transport: "stdio"
policy:
  allow_implicit_invocation: true
